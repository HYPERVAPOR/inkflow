[project]
name = "inkflow-cli"
version = "0.2.0"
description = "CLI entry point for InkFlow"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "inkflow-core",
    "inkflow-generators",
    "inkflow-workflows",
    "inkflow-assembly",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/inkflow_cli"]

[tool.uv.sources]
inkflow-core = { workspace = true }
inkflow-generators = { workspace = true }
inkflow-workflows = { workspace = true }
inkflow-assembly = { workspace = true }

[project.scripts]
inkflow = "inkflow_cli.main:main"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
