[project]
name = "inkflow-generators"
version = "0.2.0"
description = "AI and local media generators for InkFlow"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "inkflow-core",
    "httpx>=0.25.0",
    "edge-tts>=6.1.0",
    "pydub>=0.25.1",
    "pillow>=10.0.0",
    "audioop-lts>=0.2.1; python_version >= '3.13'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/inkflow_generators"]

[tool.uv.sources]
inkflow-core = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
