[project]
name = "inkflow-remotion"
version = "0.2.0"
description = "Remotion renderer bridge for InkFlow"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "inkflow-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/inkflow_remotion"]

[tool.uv.sources]
inkflow-core = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
